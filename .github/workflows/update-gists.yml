name: Update Gists

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-gists:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate gists.md
        env:
          GH_USER: dims
        run: |
          python3 << 'PYEOF'
          import json
          import os
          import sys
          import urllib.request
          from datetime import datetime, timezone

          username = os.environ["GH_USER"]

          def gh_get(url):
              req = urllib.request.Request(url, headers={
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "User-Agent": "gists-updater",
              })
              with urllib.request.urlopen(req) as resp:
                  data = json.loads(resp.read())
                  link = resp.headers.get("Link", "")
                  return data, link

          def fetch_all_gists():
              gists = []
              url = f"https://api.github.com/users/{username}/gists?per_page=100"
              while url:
                  data, link = gh_get(url)
                  gists.extend(data)
                  url = None
                  for part in link.split(","):
                      part = part.strip()
                      if 'rel="next"' in part:
                          url = part.split(";")[0].strip().strip("<>")
              return gists

          def fmt_date(iso):
              dt = datetime.fromisoformat(iso.replace("Z", "+00:00"))
              return dt.strftime("%Y-%m-%d")

          def fmt_age(iso):
              dt = datetime.fromisoformat(iso.replace("Z", "+00:00"))
              now = datetime.now(timezone.utc)
              days = (now - dt).days
              if days == 0:
                  return "today"
              if days == 1:
                  return "yesterday"
              if days < 30:
                  return f"{days}d ago"
              if days < 365:
                  return f"{days // 30}mo ago"
              years = days // 365
              months = (days % 365) // 30
              return f"{years}y {months}mo ago" if months else f"{years}y ago"

          def cell(s):
              return s.replace("|", "\\|").replace("\n", " ").replace("\r", "")

          print("Fetching gists...", file=sys.stderr)
          gists = fetch_all_gists()
          gists.sort(key=lambda g: g["updated_at"], reverse=True)
          print(f"Found {len(gists)} public gists", file=sys.stderr)

          now_str = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")

          lines = []
          lines.append("# 📝 Gists\n")
          lines.append(f"> 🗂️ **{len(gists)} public gists** &nbsp;·&nbsp; 🕐 last refreshed {now_str}\n")
          lines.append("")

          current_year = None
          for g in gists:
              year = g["updated_at"][:4]
              if year != current_year:
                  current_year = year
                  lines.append(f"## 📅 {year}\n")
                  lines.append("| 📄 Gist | 🗃️ Files | 🌱 Created | ✏️ Updated |")
                  lines.append("|--------|---------|-----------|-----------|")

              desc = (g.get("description") or "").strip()
              files = list(g["files"].keys())
              url = g["html_url"]
              gist_id = g["id"][:8]

              if desc:
                  title = f"[{cell(desc)}]({url})"
              else:
                  first = files[0] if files else gist_id
                  title = f"[{cell(first)}]({url})"

              if len(files) == 1:
                  files_cell = f"`{cell(files[0])}`"
              else:
                  files_cell = f"`{cell(files[0])}` +{len(files)-1}"

              created = fmt_date(g["created_at"])
              updated = fmt_age(g["updated_at"])

              lines.append(f"| {title} | {files_cell} | {created} | {updated} |")

          lines.append("")
          lines.append("---")
          lines.append(f"*🤖 Auto-generated every 6 hours by [update-gists](.github/workflows/update-gists.yml)*")
          lines.append("")

          with open("gists.md", "w") as f:
              f.write("\n".join(lines))

          print("gists.md written.", file=sys.stderr)
          PYEOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gists.md
          git diff --staged --quiet && echo "No changes." || (git commit -m "chore: update gists.md" && git push)
